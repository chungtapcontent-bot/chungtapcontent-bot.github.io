<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Album nhạc</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
        }

        /* KHUNG RỘNG HƠN */
        .box {
            width: 80%;
            max-width: 900px;
            margin: 40px auto;
            padding: 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* TIÊU ĐỀ CHẠY */
        .title {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            animation: move 2s infinite alternate;
            margin-bottom: 20px;
        }

        @keyframes move {
            from { transform: translateX(-10px); color: purple; }
            to { transform: translateX(10px); color: red; }
        }

        /* KHUNG NHẠC */
        .song {
            margin-bottom: 25px;
        }

        iframe {
            width: 100%;
            height: 166px;
            border-radius: 10px;
        }

        .label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>

<body>

<div class="box">

    <!-- TIÊU ĐỀ -->
    <div class="title">🎵 Nhạc Online 🎵</div>

    <!-- BÀI 1 -->
    <div class="song">
        <span class="label">Bài 1</span>
        <iframe scrolling="no" frameborder="no" allow="autoplay"
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1109784400&color=%23ff5500">
        </iframe>
    </div>

    <!-- BÀI 2 -->
    <div class="song">
        <span class="label">Bài 2</span>
        <iframe scrolling="no" frameborder="no" allow="autoplay"
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/243823577&color=%23ff5500">
        </iframe>
    </div>

</div>

</body>
</html>
